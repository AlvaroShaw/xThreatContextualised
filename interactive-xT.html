<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expected Threat (xT) - Premium Dark Theme</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* Transparent body so the main article's burgundy shows through */
        body {
            background-color: transparent; 
            color: #f0f0f0;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        
        /* Stripped of borders/shadows to avoid the "Box-in-a-Box" look */
        .viz-container {
            width: 100%;
            max-width: 800px;
            padding: 0;
        }

        .header-box {
            text-align: center;
            margin-bottom: 25px;
        }

        h2 {
            font-family: 'Oswald', sans-serif;
            font-size: 32px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #ffffff;
            margin: 0 0 10px 0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .subtitle {
            color: #ff9999;
            font-size: 15px;
            font-weight: 400;
            margin: 0;
        }

        #info-box {
            background-color: #170303;
            border-left: 4px solid #d4af37; /* Classy Gold */
            padding: 15px 20px;
            border-radius: 6px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            min-height: 75px;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 25px;
            color: #cccccc;
        }

        .highlight-val {
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            color: #d4af37; /* Classy Gold */
            font-size: 20px;
            letter-spacing: 1px;
        }

        svg {
            display: block;
            margin: 0 auto;
            border-radius: 4px;
            /* Give the SVG a subtle background to separate it from the page */
            background-color: rgba(0, 0, 0, 0.2); 
        }

        .grid-cell {
            cursor: pointer;
            transition: opacity 0.15s ease;
        }

        /* The pitch lines are styled here, but JS controls the pointer-events */
        .pitch-line {
            fill: none;
            stroke: rgba(255, 255, 255, 0.3);
            stroke-width: 2px;
        }
    </style>
</head>
<body>

<div class="viz-container">
    <div class="header-box">
        <h2>Expected Threat Matrix</h2>
        <p class="subtitle">Hover over the zones to view the scoring probability generated by successful passes.</p>
    </div>
    
<div id="info-box">
        <span style="color: #ffffff;">Expected Threat (xT) = </span><span class="highlight-val">--</span><br>
        <span style="color: #999;">Interact with the pitch to analyze the spatial value of possession.</span>
    </div>

    <div id="pitch-container"></div>
</div>

<script>
    const width = 720;
    const height = 480;
    const cols = 12;
    const rows = 8;
    const cellW = width / cols;
    const cellH = height / rows;

    const xtData = [
        [0.006, 0.006, 0.008, 0.010, 0.012, 0.014, 0.016, 0.019, 0.022, 0.028, 0.035, 0.037],
        [0.006, 0.007, 0.009, 0.011, 0.014, 0.016, 0.020, 0.024, 0.029, 0.039, 0.048, 0.052],
        [0.006, 0.007, 0.010, 0.013, 0.016, 0.020, 0.024, 0.030, 0.040, 0.055, 0.078, 0.089],
        [0.007, 0.008, 0.011, 0.015, 0.019, 0.024, 0.029, 0.036, 0.050, 0.070, 0.108, 0.256],
        [0.007, 0.008, 0.011, 0.015, 0.019, 0.024, 0.029, 0.036, 0.050, 0.070, 0.108, 0.256],
        [0.006, 0.007, 0.010, 0.013, 0.016, 0.020, 0.024, 0.030, 0.040, 0.055, 0.078, 0.089],
        [0.006, 0.007, 0.009, 0.011, 0.014, 0.016, 0.020, 0.024, 0.029, 0.039, 0.048, 0.052],
        [0.006, 0.006, 0.008, 0.010, 0.012, 0.014, 0.016, 0.019, 0.022, 0.028, 0.035, 0.037]
    ];

    // Dark red to bright crimson to striking gold
    const colorScale = d3.scaleLinear()
                         .domain([0, 0.03, 0.15])
                         .range(["rgba(74, 16, 16, 0.3)", "#c70000", "#d4af37"]);

    // Fully responsive viewBox
    const svg = d3.select("#pitch-container")
                  .append("svg")
                  .attr("viewBox", `0 0 ${width} ${height}`)
                  .attr("width", "100%")
                  .attr("height", "100%");

    // Three distinct layers to completely stop glitching
    const gridGroup = svg.append("g");
    const highlightGroup = svg.append("g"); 
    // pointer-events: none stops the pitch lines from blocking your mouse!
    const pitchGroup = svg.append("g").style("pointer-events", "none");

    // Draw Heatmap Grid
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            let val = xtData[r][c];
            gridGroup.append("rect")
               .attr("class", "grid-cell")
               .attr("x", c * cellW)
               .attr("y", r * cellH)
               .attr("width", cellW)
               .attr("height", cellH)
               .attr("fill", colorScale(val))
               .attr("opacity", 0.85)
               .on("mouseover", function() {
                   
                   // 1. Instantly draw a crisp white box in the highlight layer
                   highlightGroup.selectAll("*").remove();
                   highlightGroup.append("rect")
                       .attr("x", c * cellW)
                       .attr("y", r * cellH)
                       .attr("width", cellW)
                       .attr("height", cellH)
                       .attr("fill", "none")
                       .attr("stroke", "#ffffff")
                       .attr("stroke-width", 3);

                   // 2. Make the current square fully opaque
                   d3.select(this).attr("opacity", 1);

                   // 3. Update Info text
                   const percent = (val * 100).toFixed(1);
                   document.getElementById("info-box").innerHTML = `
                       <span style="color: #ffffff;">Expected Threat (xT) = </span><span class="highlight-val">${val.toFixed(3)}</span><br>
                       <span style="color: #999;">Possession in this zone results in a goal <b>${percent}%</b> of the time in the next few actions.</span>
                   `;
               })
              .on("mouseout", function() {
                   highlightGroup.selectAll("*").remove();
                   d3.select(this).attr("opacity", 0.85);

                   document.getElementById("info-box").innerHTML = `
                       <span style="color: #ffffff;">Expected Threat (xT) = </span><span class="highlight-val">--</span><br>
                       <span style="color: #999;">Interact with the pitch to analyze the spatial value of possession.</span>
                   `;
               });
        }
    }

    // Draw Pitch Lines (these sit cleanly on top because they were appended last)
    pitchGroup.append("rect")
              .attr("x", 0).attr("y", 0)
              .attr("width", width).attr("height", height)
              .attr("class", "pitch-line");

    pitchGroup.append("line")
              .attr("x1", width/2).attr("y1", 0)
              .attr("x2", width/2).attr("y2", height)
              .attr("class", "pitch-line");

    pitchGroup.append("circle")
              .attr("cx", width/2).attr("cy", height/2)
              .attr("r", width * 0.08)
              .attr("class", "pitch-line");

    pitchGroup.append("circle")
              .attr("cx", width/2).attr("cy", height/2)
              .attr("r", 3).attr("fill", "rgba(255,255,255,0.4)");

    pitchGroup.append("rect")
              .attr("x", 0).attr("y", height * 0.22)
              .attr("width", width * 0.14).attr("height", height * 0.56)
              .attr("class", "pitch-line");

    pitchGroup.append("rect")
              .attr("x", width * 0.86).attr("y", height * 0.22)
              .attr("width", width * 0.14).attr("height", height * 0.56)
              .attr("class", "pitch-line");

    pitchGroup.append("rect")
              .attr("x", 0).attr("y", height * 0.38)
              .attr("width", width * 0.05).attr("height", height * 0.24)
              .attr("class", "pitch-line");

    pitchGroup.append("rect")
              .attr("x", width * 0.95).attr("y", height * 0.38)
              .attr("width", width * 0.05).attr("height", height * 0.24)
              .attr("class", "pitch-line");

    pitchGroup.append("rect")
              .attr("x", -5).attr("y", height * 0.45)
              .attr("width", 5).attr("height", height * 0.10)
              .attr("class", "pitch-line");

    pitchGroup.append("rect")
              .attr("x", width).attr("y", height * 0.45)
              .attr("width", 5).attr("height", height * 0.10)
              .attr("class", "pitch-line");

</script>
</body>
</html>
